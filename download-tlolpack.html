<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download TLoL Pack - thelol</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ensuring consistency with index.html design language */
        :root {
            --primary-color: #007bff;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar style matching index.html */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        /* Download Section Styling */
        .download-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 20px;
        }

        .download-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            border: 1px solid #333;
        }

        .pack-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        .btn-download {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-download:hover {
            background: #0056b3;
            transform: translateY(-3px);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">thelol</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="download-tlolpack.html" style="color: var(--primary-color);">Downloads</a></li>
            <li><a href="https://github.com/faizzzlol/thelol" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <div class="download-container">
        <div class="download-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3074/3074061.png" alt="TLoL Pack" class="pack-icon">
            <h1>TLoL Pack</h1>
            <p>Download the latest version of the TLoL Minecraft Resource Pack for the best experience on our server.</p>
            
            <a href="#" class="btn-download">Download .zip</a>
            
            <div style="margin-top: 20px; font-size: 0.8rem; color: #666;">
                Version 1.0.0 | Compatible with Minecraft 1.20+
            </div>
        </div>
    </div>

    <footer>
        &copy; 2023 thelol. All rights reserved.
    </footer>

</body>
</html>
